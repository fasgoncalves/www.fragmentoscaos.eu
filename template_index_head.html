<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>📚 Biblioteca de Fragmentos do Caos</title>
  <style>
    html { scroll-behavior: smooth; }
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif; background: #fafafa; color: #222;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .sidebar {
      position: fixed; top: 0; left: 0; width: 240px; height: 100vh;
      background: #f2f2f2; padding: 20px; overflow-y: auto; border-right: 1px solid #ccc;
    }
    .sidebar h2 { font-size: 18px; margin-bottom: 10px; color: #444; }
    .sidebar ul { list-style: none; padding-left: 0; }
    .sidebar li { margin: 5px 0; }
    .sidebar a { text-decoration: none; color: indigo; font-weight: bold; }
    .sidebar a:hover { text-decoration: underline; }
    .content {
      margin-left: 260px; padding: 40px; text-align: center;
    }
    h1 {
      font-size: 32px; margin-bottom: 10px; color: indigo;
    }
    h2 {
      font-size: 24px; margin-top: 60px; color: #444;
      border-bottom: 1px solid #ddd; display: inline-block; padding-bottom: 4px;
      scroll-margin-top: 100px;
    }
    ul.artigos {
      list-style: none; padding: 0; margin-top: 20px; transition: opacity 0.3s ease;
    }
    ul.artigos li {
      margin: 12px 0; font-size: 18px; transition: transform 0.2s ease;
    }
    ul.artigos li:hover {
      transform: translateX(5px);
    }
    .data {
      color: #777; font-weight: 500; margin-right: 6px;
    }
    a.artigo-link {
      color: indigo; text-decoration: none; font-weight: 600;
    }
    a.artigo-link:hover {
      text-decoration: underline;
    }
    .search { margin-bottom: 20px; }
    .search input {
      padding: 8px; width: 60%; font-size: 16px;
      border: 1px solid #ccc; border-radius: 4px;
    }
    .dark-mode {
      background-color: #1e1e1e;
      color: #e0e0e0;
    }
    .dark-sidebar {
      background-color: #2d2d2d !important;
      color: #e0e0e0;
    }
    .dark-sidebar a { color: #9cdcfe !important; }
    .dark-content a.artigo-link { color: #9cdcfe; }
    .dark-content h2 { color: #c586c0; }
    .dark-content .data { color: #aaaaaa; }
    .toggle-button {
      position: fixed; top: 20px; right: 20px;
      background-color: indigo; color: white;
      border: none; padding: 10px 16px; font-size: 14px;
      border-radius: 4px; cursor: pointer; z-index: 1000;
    }
  </style>
  <script>
    function filtrarArtigos() {
      let input = document.getElementById('searchInput');
      let filter = input.value.toLowerCase();
      let artigos = document.querySelectorAll('ul.artigos li');
      artigos.forEach(function(li) {
        let texto = li.textContent || li.innerText;
        li.style.display = texto.toLowerCase().includes(filter) ? '' : 'none';
      });
    }
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      document.querySelector('.sidebar').classList.toggle('dark-sidebar');
      document.querySelector('.content').classList.toggle('dark-content');
    }
  </script>
</head>
<body>
<button class="toggle-button" onclick="toggleDarkMode()">🌓 Alternar Modo</button>
<div class="sidebar">
  <h2>Anos e Meses</h2>
